<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">



<div class="container mt-5" style="background-color: rgb(231, 232, 228); text-align: center;">

    <h1>Register Form</h1>

    <form method="POST">

        <input name="username" class="form-control mb-2" placeholder="username" type="text">
        <input name="email_id" class="form-control mb-2" placeholder="email_id" type="email">
        <input type="password" name="password" class="form-control mb-2" placeholder="password">
        <button class="btn btn-primary mb-4" style="background-origin: border-box;">Register</button>
        <hr>
        <button class="btn btn-secondary mb-4">Login</button>

    </form>


</div>
