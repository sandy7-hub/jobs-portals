<center>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <div class="container mt-5" style="background-color: rgb(240, 241, 235); text-align: center;">

        <h2> Jobs Portals </h2>
        

        <a href="/job_post"><button class="btn btn-secondary mb-4" style="position: static;">Post on job</button></a>

        <form method="GET" action="/post_page">
            <input type="text" name="search" placeholder="Search jobs...">
            <input type="number" name="min_salary" placeholder="Min salary">
            <button type="submit" class="btn btn-primary ">Filters</button>
        </form>

        {% for job in jobs %}
        <div class="job-card">
            <h3><b>COMPANY : {{ job.company }}</b></h3>
            <p>JOB ROLE : {{ job.title }}</p>
            <p>JOB DETAILS : {{ job.description }}</p>
            <p>SALARY : {{ job.salary }}</p>

            <a href="/apply/{{ job.id }}">
                <button>Apply</button>
            </a>
        </div>
        {% endfor %}
    </div>

</center>
